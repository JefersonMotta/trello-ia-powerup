<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; padding: 16px; background: #fff; color: #172b4d; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: flex-end; }
    .controls > div { flex: 1; }
    label { display: block; font-weight: 600; margin-bottom: 4px; color: #5e6c84; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    select, textarea { width: 100%; padding: 6px 8px; border: 1px solid #dfe1e6; border-radius: 3px; font-size: 13px; font-family: inherit; outline: none; }
    textarea { resize: vertical; }
    select:focus, textarea:focus { border-color: #0079bf; }
    button { padding: 8px 16px; background: #0079bf; color: #fff; border: none; border-radius: 3px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    button:hover:not(:disabled) { background: #026aa7; }
    button:disabled { opacity: .6; cursor: default; }
    #result { margin-top: 16px; display: none; }
    #result h3 { font-size: 14px; color: #5e6c84; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
    .report-content { white-space: pre-wrap; line-height: 1.6; font-size: 13px; background: #f4f5f7; border: 1px solid #dfe1e6; border-radius: 3px; padding: 14px; max-height: 380px; overflow-y: auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-box { background: #f4f5f7; border-radius: 3px; padding: 10px; text-align: center; }
    .stat-box .num { font-size: 22px; font-weight: 700; color: #0079bf; }
    .stat-box .lbl { font-size: 11px; color: #5e6c84; margin-top: 2px; }
    #error { display: none; margin-top: 12px; padding: 8px 10px; background: #ffebe6; border: 1px solid #ffbdad; border-radius: 3px; font-size: 12px; color: #bf2600; }
    #loading-msg { display: none; text-align: center; color: #5e6c84; padding: 20px; }
  </style>
</head>
<body>

<h2>Relatório do Board</h2>

<div class="controls">
  <div>
    <label>Foco do relatório</label>
    <select id="reportType">
      <option value="geral">Visão geral do board</option>
      <option value="atrasados">Cards atrasados / pendentes</option>
      <option value="prioridades">Prioridades e próximos passos</option>
      <option value="resumo">Resumo executivo</option>
    </select>
  </div>
  <button id="btnGerar">Gerar Relatório</button>
</div>

<div id="stats" style="display:none">
  <div class="stats">
    <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Total de Cards</div></div>
    <div class="stat-box"><div class="num" id="statLists">0</div><div class="lbl">Listas Ativas</div></div>
    <div class="stat-box"><div class="num" id="statDue">0</div><div class="lbl">Com Prazo</div></div>
  </div>
</div>

<div id="loading-msg">Analisando o board com IA... pode levar alguns segundos.</div>
<div id="error"></div>

<div id="result">
  <h3>Análise gerada pela IA</h3>
  <div class="report-content" id="reportContent"></div>
</div>

<script src="./shared.js"></script>
<script>
  var t = TrelloPowerUp.iframe();

  document.getElementById('btnGerar').addEventListener('click', async function() {
    hideError();
    document.getElementById('result').style.display = 'none';
    document.getElementById('stats').style.display = 'none';

    setLoading(this, true, 'Gerar Relatório');
    document.getElementById('loading-msg').style.display = 'block';

    try {
      var cfg = await getConfig(t);
      if (!configOk(cfg)) throw new Error('Configure as chaves de API nas Configurações do Power-Up.');

      var board = await t.board('id', 'name');

      // Busca listas e cards
      var [lists, cards] = await Promise.all([
        trelloFetch('GET', '/boards/' + board.id + '/lists?filter=open', cfg),
        trelloFetch('GET', '/boards/' + board.id + '/cards?filter=open&fields=name,desc,idList,due,dueComplete,labels', cfg)
      ]);

      // Monta resumo estruturado
      var boardSummary = 'Board: ' + board.name + '\n\n';
      var cardsWithDue = cards.filter(function(c) { return c.due; }).length;

      lists.forEach(function(list) {
        var listCards = cards.filter(function(c) { return c.idList === list.id; });
        boardSummary += '📋 Lista: ' + list.name + ' (' + listCards.length + ' cards)\n';
        listCards.forEach(function(c) {
          var due = c.due ? ' | Prazo: ' + new Date(c.due).toLocaleDateString('pt-BR') : '';
          var late = c.due && !c.dueComplete && new Date(c.due) < new Date() ? ' ⚠️ ATRASADO' : '';
          boardSummary += '  • ' + c.name + due + late + '\n';
        });
        boardSummary += '\n';
      });

      // Stats
      document.getElementById('statTotal').textContent = cards.length;
      document.getElementById('statLists').textContent = lists.length;
      document.getElementById('statDue').textContent = cardsWithDue;
      document.getElementById('stats').style.display = 'block';

      // Prompt por tipo
      var tipoMap = {
        'geral': 'Faça uma análise geral do estado do board, destacando o progresso de cada lista.',
        'atrasados': 'Identifique cards atrasados ou pendentes e sugira ações imediatas.',
        'prioridades': 'Liste as prioridades e próximos passos mais importantes do board.',
        'resumo': 'Crie um resumo executivo do board para ser apresentado em reunião.'
      };

      var tipo = document.getElementById('reportType').value;
      var prompt = tipoMap[tipo] || tipoMap['geral'];

      var report = await claudeChat([
        { role: 'user', content: 'Com base no seguinte estado do board Trello:\n\n' + boardSummary + '\n\n' + prompt + '\n\nSeja objetivo e prático. Use markdown simples (listas, negrito).' }
      ], cfg.openaiKey);

      document.getElementById('reportContent').textContent = report;
      document.getElementById('result').style.display = 'block';

    } catch (e) {
      showError(e.message);
    }

    document.getElementById('loading-msg').style.display = 'none';
    setLoading(document.getElementById('btnGerar'), false, 'Gerar Relatório');
  });
</script>
</body>
</html>
