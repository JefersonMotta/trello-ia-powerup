<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  var ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Cpath d='M8 12c-2 1-3 3-3 5h14c0-2-1-4-3-5'/%3E%3Cpath d='M10 16v2M14 16v2'/%3E%3C/svg%3E";

  TrelloPowerUp.initialize({

    'board-buttons': function(t) {
      return [
        {
          icon: { dark: ICON, light: ICON },
          text: 'Criar Card IA',
          callback: function(t) {
            return t.popup({
              title: 'Criar Card com Inteligência Artificial',
              url: t.signUrl('./create-card.html'),
              height: 460
            });
          }
        },
        {
          icon: { dark: ICON, light: ICON },
          text: 'Relatório IA',
          callback: function(t) {
            return t.modal({
              title: 'Relatório do Board',
              url: t.signUrl('./report.html'),
              height: 620,
              fullscreen: false
            });
          }
        }
      ];
    },

    'card-buttons': function(t) {
      return [{
        icon: ICON,
        text: 'Gerenciar',
        callback: function(t) {
          return t.popup({
            title: 'Gerenciar Card',
            url: t.signUrl('./manage-card.html'),
            height: 380
          });
        }
      }];
    },

    'show-settings': function(t) {
      return t.popup({
        title: 'Configurações — Trello IA',
        url: t.signUrl('./settings.html'),
        height: 340
      });
    }

  }, { appKey: 'd1ca7a271a8ab614d1b1d96a828cdfec', appName: 'Trello IA Assistant' });
</script>
</body>
</html>
